{{ define "main" }}

<section class="hero">
  <h1>Let’s Go Irish.</h1>
  <p>Notre Dame football thoughts, reactions, and game-day notes.</p>
</section>

<section>
  {{ range site.RegularPages }}
    <article>
      <div class="post-meta">{{ .Date.Format "January 2, 2006" }}</div>
      <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
      <p>{{ .Summary }}</p>
    </article>
  {{ end }}
</section>

{{ end }}
