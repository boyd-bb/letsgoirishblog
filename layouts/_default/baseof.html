<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Site.Title }}</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111827;
      color: #f3f4f6;
      line-height: 1.7;
    }

    img {
      max-width: 100%;
      height: auto;
    }

    .wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 1.25rem;
    }

    header {
      padding: 1.5rem 0;
      border-bottom: 1px solid #2d3748;
      background: #111827;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
    }

    .site-title {
      font-size: 1.25rem;
      font-weight: 800;
      color: #ffffff;
      text-decoration: none;
    }

    .nav a {
      color: #d1d5db;
      text-decoration: none;
      font-weight: 600;
      margin-left: 1rem;
    }

    .hero {
      padding: 3rem 0 2rem;
    }

    .hero h1 {
      font-size: 2.6rem;
      line-height: 1.1;
      margin-bottom: .5rem;
      color: #ffffff;
    }

    .hero p {
      color: #9ca3af;
      font-size: 1.1rem;
      max-width: 620px;
    }

    main {
      padding-bottom: 4rem;
    }

    article {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.25rem;
    }

    article h2,
    article h3 {
      margin-top: 0;
    }

    article a {
      color: #f9fafb;
      text-decoration: none;
    }

    article a:hover {
      color: #c99700;
    }

    .post-meta {
      color: #9ca3af;
      font-size: .9rem;
      margin-bottom: .75rem;
    }

    footer {
      border-top: 1px solid #2d3748;
      padding: 2rem 0;
      color: #9ca3af;
      font-size: .9rem;
      background: #111827;
    }

    @media (max-width: 600px) {
      .nav {
        flex-direction: column;
        align-items: flex-start;
      }

      .nav a {
        margin-left: 0;
        margin-right: 1rem;
      }

      .hero h1 {
        font-size: 2rem;
      }

      article {
        padding: 1rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap nav">
      <a class="site-title" href="{{ .Site.BaseURL }}">{{ .Site.Title }}</a>
      <nav>
        <a href="{{ .Site.BaseURL }}">Home</a>
        <a href="{{ .Site.BaseURL }}editions/">Archives</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    {{ block "main" . }}{{ end }}
  </main>

  <footer>
    <div class="wrap">
      © {{ now.Format "2006" }} {{ .Site.Title }}
    </div>
  </footer>
</body>
</html>
